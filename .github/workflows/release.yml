name: Build & Release macOS DMG

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt pyinstaller

      - name: Install system dependencies
        run: |
          brew install tesseract create-dmg

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Verify DMG exists
        env:
          BUILD_VERSION: ${{ steps.version.outputs.version }}
        run: |
          DMG_FILE="ClashOfClansBot-${BUILD_VERSION}.dmg"
          if [ ! -f "$DMG_FILE" ]; then
            echo "ERROR: $DMG_FILE not found"
            ls -la *.dmg 2>/dev/null || echo "No DMG files found"
            exit 1
          fi
          echo "DMG_FILE=$DMG_FILE" >> "$GITHUB_ENV"
          ls -lh "$DMG_FILE"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            "$DMG_FILE" \
            --title "ClashOfClans Bot $TAG_NAME" \
            --generate-notes
