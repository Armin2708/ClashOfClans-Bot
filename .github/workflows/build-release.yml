name: Build & Release macOS DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Extract version from tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          echo "VERSION=${TAG_NAME#v}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app and .dmg
        run: |
          chmod +x build_macos.sh
          ./build_macos.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClashOfClansBot-DMG
          path: ClashOfClansBot-*.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClashOfClansBot-*.dmg
          body: |
            ## CoC Bot

            Automated farming bot for Clash of Clans.

            ### Features
            - First-launch onboarding wizard (BlueStacks setup + ADB connection)
            - Clean 3-tab UI: Dashboard, Settings, Log
            - Automated farming with loot thresholds
            - Discord webhook notifications
            - Self-contained app (ADB + Tesseract bundled)

            ### Requirements
            - macOS 10.15+
            - BlueStacks emulator set to 2560x1440 resolution

            ### Install
            Download the DMG below, open it, drag CoC Bot to Applications, and launch.
          draft: false
          prerelease: false
